<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 720" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-key { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="720" />

<text class="title" x="60" y="42">五层框架：美国真正该打的仗</text>
<text class="subtitle" x="60" y="64">不是每层都要赢，而是守对关键层、放弃打不赢的层</text>

<g>
  <rect class="layer" x="60" y="96" width="580" height="100" rx="10" />
  <text class="eyebrow" x="82" y="118">LAYER 5</text>
  <text class="eyebrow" x="618" y="118" text-anchor="end">→ 深耕主场 · 出海第三方</text>
  <text class="th" x="82" y="150">应用</text>
  <text class="ts" x="82" y="170">Applications</text>
  <line class="divider" x1="220" y1="110" x2="220" y2="182" />
  <text class="t" x="238" y="150">消费 AI 中美分市场；企业 SaaS 美国仍有地盘</text>
  <text class="t" x="238" y="172">深耕 Fortune 500 / 盟友，东南亚、中东反入侵</text>
</g>

<g>
  <rect class="layer" x="60" y="208" width="580" height="100" rx="10" />
  <text class="eyebrow" x="82" y="230">LAYER 4</text>
  <text class="eyebrow" x="618" y="230" text-anchor="end">→ 持续投入 · 不靠封锁</text>
  <text class="th" x="82" y="262">模型</text>
  <text class="ts" x="82" y="282">Models</text>
  <line class="divider" x1="220" y1="222" x2="220" y2="294" />
  <text class="t" x="238" y="262">领先已缩到 3-6 个月（2024 年还是 12 个月）</text>
  <text class="t" x="238" y="284">真正护城河是 OpenAI / Anthropic 的资本开支</text>
</g>

<g>
  <rect class="layer-key" x="60" y="320" width="580" height="100" rx="10" />
  <text class="eyebrow eyebrow-accent" x="82" y="342">LAYER 3 · 关键护城河</text>
  <text class="eyebrow eyebrow-accent" x="618" y="342" text-anchor="end">→ 开门卖 · 留住开发者</text>
  <text class="th" x="82" y="374">基础设施</text>
  <text class="ts" x="82" y="394">Infrastructure · CUDA</text>
  <line class="divider-accent" x1="220" y1="334" x2="220" y2="406" />
  <text class="t" x="238" y="374">CUDA 是 20 年开发者生态，技术可复制，生态不能一夜搬家</text>
  <text class="t" x="238" y="396">禁运把全球一半开发者推向 CANN / MUSA，亲手拆城墙</text>
</g>

<g>
  <rect class="layer" x="60" y="432" width="580" height="100" rx="10" />
  <text class="eyebrow" x="82" y="454">LAYER 2</text>
  <text class="eyebrow" x="618" y="454" text-anchor="end">→ 守 3nm 以下 · 放 7nm 以上</text>
  <text class="th" x="82" y="486">芯片</text>
  <text class="ts" x="82" y="506">Chips</text>
  <line class="divider" x1="220" y1="446" x2="220" y2="518" />
  <text class="t" x="238" y="486">3nm 以下美国联盟领先 10-15 年，EUV 是真卡点</text>
  <text class="t" x="238" y="508">7-28nm 中端中国实质自给，继续管制没有边际收益</text>
</g>

<g>
  <rect class="layer" x="60" y="544" width="580" height="100" rx="10" />
  <text class="eyebrow" x="82" y="566">LAYER 1</text>
  <text class="eyebrow" x="618" y="566" text-anchor="end">→ 接受落后 · 走侧门</text>
  <text class="th" x="82" y="598">能源</text>
  <text class="ts" x="82" y="618">Energy</text>
  <line class="divider" x1="220" y1="558" x2="220" y2="630" />
  <text class="t" x="238" y="598">中国发电量 2× 美国，新增装机仍在翻</text>
  <text class="t" x="238" y="620">侧门：能效优化、SMR 核电、加拿大 / 中东盟友能源</text>
</g>

<text class="caption-strong" x="60" y="680">"不要为了第 4 层，亲手把第 3 层和第 5 层也一起送走。"</text>
<text class="caption" x="60" y="702">鹰派当前的交换比率是灾难性的。</text>

</svg>
