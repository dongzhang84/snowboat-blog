<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="580" />

<text class="title" x="60" y="42">美国为什么封不住：三条都堵不上的通道</text>
<text class="subtitle" x="60" y="64">出口管制的墙上有三道漏风口，每一道美国都堵不住</text>

<g>
  <rect class="layer" x="60" y="96" width="580" height="125" rx="10" />
  <text class="eyebrow" x="82" y="118">通道一 · 合法</text>
  <text class="eyebrow eyebrow-accent" x="618" y="118" text-anchor="end">→ 字节 36000 片 Blackwell</text>
  <text class="th" x="82" y="150">境外租赁</text>
  <text class="ts" x="82" y="170">Offshore Rental</text>
  <line class="divider" x1="220" y1="110" x2="220" y2="207" />
  <text class="t" x="238" y="150">阿里、字节把 AI 训练整个搬到新加坡、马来西亚</text>
  <text class="t" x="238" y="172">在境外租美国云厂商的英伟达算力，或自建数据中心</text>
  <text class="t" x="238" y="194">拜登 AI Diffusion Rule 被川普一纸行政令撤回</text>
</g>

<g>
  <rect class="layer" x="60" y="237" width="580" height="125" rx="10" />
  <text class="eyebrow" x="82" y="259">通道二 · 灰色</text>
  <text class="eyebrow eyebrow-accent" x="618" y="259" text-anchor="end">→ 估算 10 亿美元 / 年</text>
  <text class="th" x="82" y="291">走私渠道</text>
  <text class="ts" x="82" y="311">Gray Market</text>
  <line class="divider" x1="220" y1="251" x2="220" y2="348" />
  <text class="t" x="238" y="291">壳公司在新加坡、香港登记，经东南亚转口至深圳</text>
  <text class="t" x="238" y="313">DOJ 查获 1.6 亿，SemiAnalysis 估实际 10 亿+（6x）</text>
  <text class="t" x="238" y="335">中国 60%+ 前沿 AI 训练仍在用英伟达硬件</text>
</g>

<g>
  <rect class="layer" x="60" y="378" width="580" height="125" rx="10" />
  <text class="eyebrow" x="82" y="400">通道三 · 合规</text>
  <text class="eyebrow eyebrow-accent" x="618" y="400" text-anchor="end">→ 中国推理算力主力</text>
  <text class="th" x="82" y="432">降级合规版</text>
  <text class="ts" x="82" y="452">Compliance Downgrade</text>
  <line class="divider" x1="220" y1="392" x2="220" y2="489" />
  <text class="t" x="238" y="432">H20：训练性能砍到阈值以下，推理性能几乎完整</text>
  <text class="t" x="238" y="454">部分推理基准比 H100 还快；华为昇腾走同样逻辑</text>
  <text class="t" x="238" y="476">美国盯训练，中国商业飞轮已转向推理</text>
</g>

<text class="caption-strong" x="60" y="535">"美国想封没完全封住，中国想买也没完全敞开。"</text>
<text class="caption" x="60" y="557">一场怪异的双人舞。</text>

</svg>
