<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 700" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-top { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="700" />

<text class="title" x="60" y="42">黄仁勋的 AI 五层蛋糕</text>
<text class="subtitle" x="60" y="64">从能源到应用，每一层都在决定 AI 时代的胜负</text>

<g>
  <rect class="layer-top" x="60" y="96" width="580" height="96" rx="10" />
  <text class="eyebrow eyebrow-accent" x="82" y="118">LAYER 5 · 最需要赢</text>
  <text class="th" x="82" y="146">应用</text>
  <text class="ts" x="82" y="166">Applications</text>
  <line class="divider-accent" x1="220" y1="110" x2="220" y2="178" />
  <text class="t" x="238" y="146">ChatGPT · Claude · Cursor · 抖音 AI · 电商推荐</text>
  <text class="t" x="238" y="166">Enterprise SaaS · 超级 App · 垂直行业 AI</text>
</g>

<g>
  <rect class="layer" x="60" y="202" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="224">LAYER 4</text>
  <text class="th" x="82" y="252">模型</text>
  <text class="ts" x="82" y="272">Models</text>
  <line class="divider" x1="220" y1="216" x2="220" y2="284" />
  <text class="t" x="238" y="252">GPT · Claude · Gemini</text>
  <text class="t" x="238" y="272">通义千问 · 豆包 · DeepSeek · 文心 · 智谱</text>
</g>

<g>
  <rect class="layer" x="60" y="308" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="330">LAYER 3</text>
  <text class="th" x="82" y="358">基础设施</text>
  <text class="ts" x="82" y="378">Infrastructure</text>
  <line class="divider" x1="220" y1="322" x2="220" y2="390" />
  <text class="t" x="238" y="358">数据中心 · 网络 · 云平台 · 操作系统</text>
  <text class="t" x="238" y="378">CUDA · cuDNN · PyTorch · 开发者生态</text>
</g>

<g>
  <rect class="layer" x="60" y="414" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="436">LAYER 2</text>
  <text class="th" x="82" y="464">芯片</text>
  <text class="ts" x="82" y="484">Chips</text>
  <line class="divider" x1="220" y1="428" x2="220" y2="496" />
  <text class="t" x="238" y="464">GPU · ASIC · HBM 高带宽内存</text>
  <text class="t" x="238" y="484">先进制造（台积电 / 三星）· 光刻机（ASML）</text>
</g>

<g>
  <rect class="layer" x="60" y="520" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="542">LAYER 1 · 最底层</text>
  <text class="th" x="82" y="570">能源</text>
  <text class="ts" x="82" y="590">Energy</text>
  <line class="divider" x1="220" y1="534" x2="220" y2="602" />
  <text class="t" x="238" y="570">电网 · 发电装机 · 数据中心供电</text>
  <text class="t" x="238" y="590">核电 / 水电 / 天然气 / 可再生</text>
</g>

<text class="caption-strong" x="60" y="650">"美国每一层都必须赢，但最需要赢的那一层，是应用层。"</text>
<text class="caption" x="60" y="672">— 黄仁勋，2026 年 1 月达沃斯世界经济论坛</text>

</svg>
