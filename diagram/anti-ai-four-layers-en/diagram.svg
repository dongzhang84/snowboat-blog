<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-key { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="600" />

<text class="title" x="60" y="42">Four Layers Behind the AI Backlash</text>
<text class="subtitle" x="60" y="64">All four stacked into one 22-year-old graduate</text>

<g>
  <rect class="layer-key" x="60" y="96" width="580" height="96" rx="10" />
  <text class="eyebrow eyebrow-accent" x="82" y="118">LAYER 1 · MOST IMMEDIATE</text>
  <text class="th" x="82" y="146">Livelihood</text>
  <text class="ts" x="82" y="166">Entry-Level Collapse</text>
  <line class="divider-accent" x1="220" y1="110" x2="220" y2="178" />
  <text class="t" x="238" y="146">100K big-tech layoffs · new-grad hiring -50% vs. pre-pandemic</text>
  <text class="t" x="238" y="166">42% of Gen Z fear AI hurting jobs · loans due monthly</text>
</g>

<g>
  <rect class="layer" x="60" y="202" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="224">LAYER 2</text>
  <text class="th" x="82" y="252">Institutional</text>
  <text class="ts" x="82" y="272">AI Double Standard</text>
  <line class="divider" x1="220" y1="216" x2="220" y2="284" />
  <text class="t" x="238" y="252">Faculty use AI for prep · students using AI = cheating</text>
  <text class="t" x="238" y="272">Detectors 20% false-positive · AI majors open, students fined</text>
</g>

<g>
  <rect class="layer" x="60" y="308" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="330">LAYER 3</text>
  <text class="th" x="82" y="358">Dignity</text>
  <text class="ts" x="82" y="378">Creator Identity</text>
  <line class="divider" x1="220" y1="322" x2="220" y2="390" />
  <text class="t" x="238" y="358">Identity can't be outsourced · data scraped without consent</text>
  <text class="t" x="238" y="378">200 musicians open letter · 1,000 UK artists protest album</text>
</g>

<g>
  <rect class="layer" x="60" y="414" width="580" height="96" rx="10" />
  <text class="eyebrow" x="82" y="436">LAYER 4 · MOST DIFFUSE</text>
  <text class="th" x="82" y="464">Consumer</text>
  <text class="ts" x="82" y="484">AI Shoved Everywhere</text>
  <line class="divider" x1="220" y1="428" x2="220" y2="496" />
  <text class="t" x="238" y="464">Google AI Overview 37% wrong · CS bots won't escalate</text>
  <text class="t" x="238" y="484">AI slop floods every feed · more use, less excitement</text>
</g>

<text class="caption-strong" x="60" y="550">When Schmidt said "get on the rocket," he met all four layers at once.</text>
<text class="caption" x="60" y="572">— Chapter III · The Backlash Has Real Roots</text>

</svg>
