<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 680" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; --blue: #2563eb; --blue-bg: #eff6ff; --blue-stroke: #93c5fd; --green: #059669; --green-bg: #ecfdf5; --green-stroke: #6ee7b7; --amber: #d97706; --amber-bg: #fffbeb; --amber-stroke: #fcd34d; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; --blue: #93c5fd; --blue-bg: #172554; --blue-stroke: #2563eb; --green: #6ee7b7; --green-bg: #052e2b; --green-stroke: #047857; --amber: #fbbf24; --amber-bg: #3b2f12; --amber-stroke: #92400e; } }
.bg { fill: var(--bg); }
.panel { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.1; }
.hub { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.6; }
.node-high { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.5; }
.node-blue { fill: var(--blue-bg); stroke: var(--blue-stroke); stroke-width: 1.3; }
.node-green { fill: var(--green-bg); stroke: var(--green-stroke); stroke-width: 1.3; }
.node-amber { fill: var(--amber-bg); stroke: var(--amber-stroke); stroke-width: 1.3; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 13px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 11.5px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 11px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.line { stroke: var(--divider); stroke-width: 1.2; fill: none; }
.line-accent { stroke: var(--accent-stroke); stroke-width: 1.3; fill: none; }
.dash { stroke: var(--fg-soft); stroke-width: 1.3; stroke-dasharray: 5 5; fill: none; }
.band { fill: none; stroke: var(--fg-soft); stroke-width: 1.2; stroke-dasharray: 6 5; }
</style>
<rect class="bg" width="680" height="680"/>
<text class="title" x="60" y="42">美国律师生态：按客户和角色分裂</text>
<text class="subtitle" x="60" y="64">同样是律师，服务对象、收费模式、收入天花板和社会功能完全不同</text>
<rect class="panel" x="60" y="96" width="250" height="190" rx="18"/>
<text class="eyebrow eyebrow-accent" x="82" y="122">CORPORATE POWER</text>
<text class="ts" x="82" y="144">大公司、投行、基金、政府</text>
<rect class="panel" x="370" y="96" width="250" height="190" rx="18"/>
<text class="eyebrow eyebrow-accent" x="392" y="122">SPECIALIST MARKET</text>
<text class="ts" x="392" y="144">专业窄门 + 地方商业市场</text>
<rect class="panel" x="60" y="328" width="250" height="150" rx="18"/>
<text class="eyebrow eyebrow-accent" x="82" y="354">EVERYDAY PEOPLE</text>
<text class="ts" x="82" y="376">个人、小生意、家庭与事故</text>
<rect class="panel" x="370" y="328" width="250" height="150" rx="18"/>
<text class="eyebrow eyebrow-accent" x="440" y="354">PUBLIC SYSTEM</text>
<path class="line" d="M 250 190 C 292 210 305 246 318 286"/>
<path class="line" d="M 430 190 C 388 210 375 246 362 286"/>
<path class="line" d="M 225 405 C 278 393 304 364 323 338"/>
<path class="line" d="M 465 405 C 412 393 386 364 357 338"/>
<circle class="hub" cx="340" cy="312" r="64"/>
<text class="eyebrow eyebrow-accent" x="340" y="286" text-anchor="middle">US LAWYERS</text>
<text class="th" x="340" y="314" text-anchor="middle">约 130 万</text>
<text class="ts" x="340" y="336" text-anchor="middle">持牌律师</text>
<circle class="node-high" cx="155" cy="205" r="52"/>
<text class="th" x="155" y="196" text-anchor="middle">BigLaw</text>
<text class="ts" x="155" y="217" text-anchor="middle">几百到几千人大所</text>
<text class="ts" x="155" y="237" text-anchor="middle">partner 可达数百万</text>
<circle class="node-high" cx="250" cy="175" r="42"/>
<text class="th" x="250" y="168" text-anchor="middle">In-house</text>
<text class="ts" x="250" y="189" text-anchor="middle">公司法务 / GC</text>
<circle class="node-blue" cx="455" cy="185" r="45"/>
<text class="th" x="455" y="178" text-anchor="middle">Boutique</text>
<text class="ts" x="455" y="199" text-anchor="middle">反垄断 / IP / 刑辩</text>
<circle class="node-blue" cx="555" cy="220" r="43"/>
<text class="th" x="555" y="212" text-anchor="middle">Regional</text>
<text class="ts" x="555" y="233" text-anchor="middle">本地中型企业</text>
<circle class="node-amber" cx="155" cy="425" r="50"/>
<text class="th" x="155" y="416" text-anchor="middle">Solo</text>
<text class="ts" x="155" y="437" text-anchor="middle">约 40% 独立执业</text>
<text class="ts" x="155" y="457" text-anchor="middle">家庭法 / 移民 / 车祸</text>
<circle class="node-green" cx="450" cy="425" r="43"/>
<text class="th" x="450" y="410" text-anchor="middle">Gov.</text>
<text class="th" x="450" y="428" text-anchor="middle">Lawyers</text>
<text class="ts" x="450" y="449" text-anchor="middle">DA / DOJ / SEC</text>
<circle class="node-green" cx="540" cy="405" r="40"/>
<text class="th" x="540" y="394" text-anchor="middle">Public</text>
<text class="th" x="540" y="412" text-anchor="middle">Defender</text>
<text class="ts" x="540" y="433" text-anchor="middle">刑事兜底</text>
<circle class="node-green" cx="600" cy="472" r="38"/>
<text class="th" x="600" y="465" text-anchor="middle">Legal Aid</text>
<text class="ts" x="600" y="486" text-anchor="middle">低收入民事</text>
<rect class="band" x="118" y="525" width="444" height="86" rx="35"/>
<text class="eyebrow" x="145" y="552">CROSS-CUTTING RELATIONSHIP</text>
<text class="th" x="145" y="576">Personal Counsel / 私人律师</text>
<text class="ts" x="145" y="596">富人、CEO、名人长期 retain，可来自 Solo、Boutique、BigLaw 或 family office</text>
<line class="line-accent" x1="60" y1="625" x2="620" y2="625"/>
<text class="caption-strong" x="60" y="650">关键点：这不是一个收入连续谱，而是几套不同市场叠在一起。</text>
<text class="caption" x="60" y="672">BigLaw partner 和 Legal Aid 律师都叫 lawyer，但客户、收入、声望和工作逻辑相差可达数十倍。</text>
</svg>
