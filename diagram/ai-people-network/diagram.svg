<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 760" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-key { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
.zone-openai { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.2; }
.zone-upstream { fill: #fffbeb; stroke: #fde68a; stroke-width: 1.2; }
.zone-deepmind { fill: #fff1f2; stroke: #fecdd3; stroke-width: 1.2; }
.zone-video { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; }
.zone-isolated { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.2; }
.edge { stroke: #64748b; stroke-width: 1.25; fill: none; opacity: 0.42; }
.edge-strong { stroke: #475569; stroke-width: 1.6; fill: none; opacity: 0.52; }
.edge-mentor { stroke: #d97706; stroke-width: 1.25; fill: none; opacity: 0.52; stroke-dasharray: 5 4; }
.edge-bridge { stroke: #7c3aed; stroke-width: 1.25; fill: none; opacity: 0.45; stroke-dasharray: 4 4; }
.node-openai { fill: #3b82f6; stroke: #ffffff; stroke-width: 2.2; }
.node-upstream { fill: #d97706; stroke: #ffffff; stroke-width: 2.2; }
.node-deepmind { fill: #be185d; stroke: #ffffff; stroke-width: 2.2; }
.node-video { fill: #f59e0b; stroke: #ffffff; stroke-width: 2.2; }
.node-isolated { fill: #94a3b8; stroke: #ffffff; stroke-width: 2.2; }
.label-bg { fill: var(--bg); opacity: 0.92; }
.name { fill: var(--fg); font-size: 9.5px; font-weight: 600; }
.name-small { fill: var(--fg); font-size: 8.8px; font-weight: 500; }
.initial { fill: #ffffff; font-size: 10px; font-weight: 700; }
</style>
