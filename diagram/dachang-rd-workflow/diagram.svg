<line class="arr" x1="311" y1="400" x2="321" y2="400" />
<polygon class="head" points="321,400 317,398 317,402" />
<rect class="pill" x="323" y="384" width="82" height="32" rx="6" />
<text class="pt" x="364" y="405" text-anchor="middle">bug 循环</text>
<line class="arr" x1="405" y1="400" x2="415" y2="400" />
<polygon class="head" points="415,400 411,398 411,402" />
<rect class="pill-gate" x="417" y="384" width="40" height="32" rx="6" />
<text class="pt" x="437" y="405" text-anchor="middle">UAT</text>

<line class="arr-down" x1="340" y1="416" x2="340" y2="466" />
<polygon class="head" points="340,470 336,464 344,464" />

<text class="eyebrow" x="60" y="458"><tspan class="eyebrow-num">05</tspan> · 上线阶段</text>
<rect class="pill-gate" x="248" y="470" width="44" height="32" rx="6" />
<text class="pt" x="270" y="491" text-anchor="middle">灰度</text>
<line class="arr" x1="292" y1="486" x2="302" y2="486" />
<polygon class="head" points="302,486 298,484 298,488" />
<rect class="pill" x="304" y="470" width="44" height="32" rx="6" />
<text class="pt" x="326" y="491" text-anchor="middle">全量</text>
<line class="arr" x1="348" y1="486" x2="358" y2="486" />
<polygon class="head" points="358,486 354,484 354,488" />
<rect class="pill" x="360" y="470" width="72" height="32" rx="6" />
<text class="pt" x="396" y="491" text-anchor="middle">监控应急</text>

<line class="arr-down" x1="340" y1="502" x2="340" y2="552" />
<polygon class="head" points="340,556 336,550 344,550" />

<text class="eyebrow" x="60" y="544"><tspan class="eyebrow-num">06</tspan> · 验证回收</text>
<rect class="pill" x="248" y="556" width="72" height="32" rx="6" />
<text class="pt" x="284" y="577" text-anchor="middle">数据验证</text>
<line class="arr" x1="320" y1="572" x2="330" y2="572" />
<polygon class="head" points="330,572 326,570 326,574" />
<rect class="pill" x="332" y="556" width="44" height="32" rx="6" />
<text class="pt" x="354" y="577" text-anchor="middle">复盘</text>
<line class="arr" x1="376" y1="572" x2="386" y2="572" />
<polygon class="head" points="386,572 382,570 382,574" />
<rect class="pill" x="388" y="556" width="44" height="32" rx="6" />
<text class="pt" x="410" y="577" text-anchor="middle">归档</text>

<text class="caption-strong" x="60" y="615">走完这条流程，少则两周，多则两三个月。</text>
<rect class="legend-normal" x="60" y="632" width="14" height="14" rx="3" />
<text class="caption" x="80" y="643">普通环节</text>
<rect class="legend-gate" x="160" y="632" width="14" height="14" rx="3" />
<text class="caption" x="180" y="643">Gate 环节，不通过回上一步修复</text>

</svg>
