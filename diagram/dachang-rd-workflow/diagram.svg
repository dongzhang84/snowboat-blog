<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 660" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.pill { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.pill-gate { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.pt { font-size: 14px; font-weight: 500; fill: var(--fg); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-num { fill: var(--accent); font-weight: 600; }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.arr { stroke: var(--fg-muted); stroke-width: 1.4; fill: none; }
.arr-down { stroke: var(--fg-muted); stroke-width: 1.6; fill: none; }
.head { fill: var(--fg-muted); }
.legend-normal { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1; }
.legend-gate { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="660" />

<text class="title" x="60" y="42">大厂研发流程：从 PRD 到归档</text>
<text class="subtitle" x="60" y="64">六个阶段，二十多个子环节，评审 gate 不通过则回上一步修复</text>

<text class="eyebrow" x="60" y="114"><tspan class="eyebrow-num">01</tspan> · 需求阶段</text>
<rect class="pill" x="292" y="126" width="40" height="32" rx="6" />
<text class="pt" x="312" y="147" text-anchor="middle">PRD</text>
<line class="arr" x1="332" y1="142" x2="342" y2="142" />
<polygon class="head" points="342,142 338,140 338,144" />
<rect class="pill-gate" x="344" y="126" width="44" height="32" rx="6" />
<text class="pt" x="366" y="147" text-anchor="middle">评审</text>

<line class="arr-down" x1="340" y1="158" x2="340" y2="208" />
<polygon class="head" points="340,212 336,206 344,206" />

<text class="eyebrow" x="60" y="200"><tspan class="eyebrow-num">02</tspan> · 设计阶段</text>
<rect class="pill" x="200" y="212" width="56" height="32" rx="6" />
<text class="pt" x="228" y="233" text-anchor="middle">UI/UX</text>
<line class="arr" x1="256" y1="228" x2="266" y2="228" />
<polygon class="head" points="266,228 262,226 262,230" />
<rect class="pill-gate" x="268" y="212" width="44" height="32" rx="6" />
