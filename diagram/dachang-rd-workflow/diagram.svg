<line class="arr" x1="312" y1="228" x2="322" y2="228" />
<polygon class="head" points="322,228 318,226 318,230" />
<rect class="pill" x="324" y="212" width="72" height="32" rx="6" />
<text class="pt" x="360" y="233" text-anchor="middle">技术方案</text>
<line class="arr" x1="396" y1="228" x2="406" y2="228" />
<polygon class="head" points="406,228 402,226 402,230" />
<rect class="pill-gate" x="408" y="212" width="72" height="32" rx="6" />
<text class="pt" x="444" y="233" text-anchor="middle">技术评审</text>

<line class="arr-down" x1="340" y1="244" x2="340" y2="294" />
<polygon class="head" points="340,298 336,292 344,292" />

<text class="eyebrow" x="60" y="286"><tspan class="eyebrow-num">03</tspan> · 开发阶段</text>
<rect class="pill" x="184" y="298" width="72" height="32" rx="6" />
<text class="pt" x="220" y="319" text-anchor="middle">任务拆分</text>
<line class="arr" x1="256" y1="314" x2="266" y2="314" />
<polygon class="head" points="266,314 262,312 262,316" />
<rect class="pill" x="268" y="298" width="88" height="32" rx="6" />
<text class="pt" x="312" y="319" text-anchor="middle">前后端开发</text>
<line class="arr" x1="356" y1="314" x2="366" y2="314" />
<polygon class="head" points="366,314 362,312 362,316" />
<rect class="pill" x="368" y="298" width="44" height="32" rx="6" />
<text class="pt" x="390" y="319" text-anchor="middle">联调</text>
<line class="arr" x1="412" y1="314" x2="422" y2="314" />
<polygon class="head" points="422,314 418,312 418,316" />
<rect class="pill-gate" x="424" y="298" width="72" height="32" rx="6" />
<text class="pt" x="460" y="319" text-anchor="middle">代码评审</text>

<line class="arr-down" x1="340" y1="330" x2="340" y2="380" />
<polygon class="head" points="340,384 336,378 344,378" />

<text class="eyebrow" x="60" y="372"><tspan class="eyebrow-num">04</tspan> · 测试阶段</text>
<rect class="pill" x="223" y="384" width="44" height="32" rx="6" />
<text class="pt" x="245" y="405" text-anchor="middle">自测</text>
<line class="arr" x1="267" y1="400" x2="277" y2="400" />
<polygon class="head" points="277,400 273,398 273,402" />
<rect class="pill-gate" x="279" y="384" width="32" height="32" rx="6" />
