<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 600" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-key { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
.spoke { stroke: var(--fg-soft); stroke-width: 1.4; fill: none; stroke-linecap: round; }
</style>
<rect class="bg" width="680" height="600"/>
<text class="title" x="60" y="42">美国税的四大板块</text>
<text class="subtitle" x="60" y="64">一个普通家庭, 四个生活时点都在交税</text>
<line class="spoke" x1="285" y1="287" x2="240" y2="230"/>
<line class="spoke" x1="395" y1="287" x2="440" y2="230"/>
<line class="spoke" x1="285" y1="343" x2="240" y2="395"/>
<line class="spoke" x1="395" y1="343" x2="440" y2="395"/>
<rect class="layer" x="60" y="110" width="180" height="120" rx="14"/>
<text class="eyebrow" x="74" y="134">EARN · 赚钱时</text>
<text class="th" x="74" y="162">所得税 + 工资税</text>
<text class="ts" x="74" y="184">工资到手就被扣</text>
<text class="ts" x="74" y="208">联邦主 + 州参与</text>
<rect class="layer" x="440" y="110" width="180" height="120" rx="14"/>
<text class="eyebrow" x="454" y="134">SPEND · 花钱时</text>
<text class="th" x="454" y="162">销售税 + 关税</text>
<text class="ts" x="454" y="184">结账时嵌在价格里</text>
<text class="ts" x="454" y="208">州地方主, 关税是联邦</text>
<rect class="layer" x="60" y="395" width="180" height="120" rx="14"/>
<text class="eyebrow" x="74" y="419">PASS ON · 传承时</text>
<text class="th" x="74" y="447">遗产税 + 赠与税</text>
<text class="ts" x="74" y="469">$1500万 免税额 / 人</text>
<text class="ts" x="74" y="493">联邦 + 少数州</text>
<rect class="layer" x="440" y="395" width="180" height="120" rx="14"/>
<text class="eyebrow" x="454" y="419">OWN · 拥有时</text>
<text class="th" x="454" y="447">财产税</text>
<text class="ts" x="454" y="469">学区房的财政根源</text>
<text class="ts" x="454" y="493">地方政府征</text>
<ellipse class="layer-key" cx="340" cy="315" rx="78" ry="40"/>
<text class="th" x="340" y="313" text-anchor="middle">你 / 普通家庭</text>
<text class="ts" x="340" y="333" text-anchor="middle">税从四个方向围过来</text>
<text class="caption-strong" x="60" y="548">四类税从赚钱、花钱、拥有、传承四个时点同时围着你。</text>
<text class="caption" x="60" y="570">"美国税"是多笔不同政府、不同时机的合计。普通中产合并下来的有效税率通常在 25%-40% 之间。</text>
</svg>
