<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 600" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.layer-key { fill: var(--accent-bg); stroke: var(--accent-stroke); stroke-width: 1.4; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
.divider { stroke: var(--divider); stroke-width: 1; }
.divider-accent { stroke: var(--accent-stroke); stroke-width: 1; }
</style>

<rect class="bg" width="680" height="600" />

<text class="title" x="60" y="42">几年后的 App 生态：三层叠在一起</text>
<text class="subtitle" x="60" y="64">头部 App 平台层 · AI 助手 + Capability 层 · 模型层</text>

<g>
  <rect class="layer" x="60" y="96" width="580" height="130" rx="10" />
  <text class="eyebrow" x="82" y="118">LAYER 1</text>
  <text class="eyebrow" x="618" y="118" text-anchor="end">→ 份额向头部集中</text>
  <text class="th" x="82" y="150">头部 App 平台层</text>
  <text class="ts" x="82" y="170">网络 / 数据 / 生态护城河</text>
  <line class="divider" x1="220" y1="110" x2="220" y2="212" />
  <text class="t" x="238" y="150">微信、抖音、淘宝、Apple、Google、Meta</text>
  <text class="t" x="238" y="172">靠网络效应、数据沉淀、内容生态、分发入口站稳</text>
  <text class="t" x="238" y="194">AI 编程让头部更深，没让头部变弱</text>
</g>

<g>
  <rect class="layer-key" x="60" y="240" width="580" height="130" rx="10" />
  <text class="eyebrow eyebrow-accent" x="82" y="262">LAYER 2 · 新战场</text>
  <text class="eyebrow eyebrow-accent" x="618" y="262" text-anchor="end">→ 未来几年最大战场</text>
  <text class="th" x="82" y="294">AI 助手层</text>
  <text class="ts" x="82" y="314">+ 现场生成的 Capability</text>
  <line class="divider-accent" x1="220" y1="254" x2="220" y2="356" />
  <text class="t" x="238" y="294">ChatGPT、Claude、Gemini、Apple Intelligence</text>
  <text class="t" x="238" y="316">调底层模型现场生成 Capability，或调头部 App API</text>
  <text class="t" x="238" y="338">谁占住这一层，有可能蚕食 App Store 的分发地位</text>
</g>

<g>
  <rect class="layer" x="60" y="384" width="580" height="130" rx="10" />
  <text class="eyebrow" x="82" y="406">LAYER 3</text>
  <text class="eyebrow" x="618" y="406" text-anchor="end">→ 卖 token 直接受益</text>
  <text class="th" x="82" y="438">模型层</text>
  <text class="ts" x="82" y="458">整张图的底层基础</text>
  <line class="divider" x1="220" y1="398" x2="220" y2="500" />
  <text class="t" x="238" y="438">Anthropic、OpenAI、Google、DeepSeek、Qwen、豆包</text>
  <text class="t" x="238" y="460">卖 token 和能力赚钱</text>
  <text class="t" x="238" y="482">每次 Capability 生成、每次助手调用都在烧 token</text>
</g>

<text class="caption-strong" x="60" y="550">三层叠在一起，每层都有不同的赢家。</text>
<text class="caption" x="60" y="572">用户入口从单个 App 迁移到 AI 助手，是 iPhone 之后入口形态的一次大迁移。</text>

</svg>
