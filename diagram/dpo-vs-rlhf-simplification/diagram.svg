<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
<style>
:root { --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af; --bg: #ffffff; --layer-bg: #f9fafb; --layer-stroke: #e5e7eb; --divider: #e5e7eb; --accent: #fb7185; --accent-bg: #fff1f2; --accent-stroke: #fca5b1; }
@media (prefers-color-scheme: dark) { :root { --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280; --bg: #0b0f17; --layer-bg: #1f2937; --layer-stroke: #374151; --divider: #374151; --accent: #fda4af; --accent-bg: #3f1d24; --accent-stroke: #9f1239; } }
.bg { fill: var(--bg); }
.layer { fill: var(--layer-bg); stroke: var(--layer-stroke); stroke-width: 1.2; }
.title { font-size: 18px; font-weight: 600; fill: var(--fg); }
.subtitle { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.t { font-size: 14px; font-weight: 400; fill: var(--fg); }
.th { font-size: 14px; font-weight: 600; fill: var(--fg); }
.ts { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.eyebrow { font-size: 12px; font-weight: 500; fill: var(--fg-soft); letter-spacing: 0.08em; }
.eyebrow-accent { fill: var(--accent); }
.caption { font-size: 12px; font-weight: 400; fill: var(--fg-muted); }
.caption-strong { font-size: 14px; font-weight: 500; fill: var(--fg); }
</style>

<rect class="bg" x="0" y="0" width="680" height="540"/>

<text class="title" x="60" y="42">DPO 与开源后训练的简化路线</text>
<text class="subtitle" x="60" y="64">RLHF 三步 → DPO 一步，工程门槛从大厂拉到开源</text>

<rect class="layer" x="60" y="95" width="270" height="290" rx="8"/>
<text class="eyebrow" x="80" y="117">大厂路线</text>
<text class="eyebrow eyebrow-accent" x="310" y="117" text-anchor="end">→ 工程门槛极高</text>
<text class="th" x="80" y="142">RLHF (PPO)</text>
<text class="ts" x="80" y="160">需要几十人 RL 团队 + 成熟训练栈</text>
<line x1="80" y1="172" x2="310" y2="172" stroke="var(--divider)" stroke-width="1"/>

<rect x="80" y="186" width="230" height="40" rx="6" fill="var(--bg)" stroke="var(--layer-stroke)" stroke-width="1.2"/>
<text class="th" x="92" y="204">① SFT</text>
<text class="ts" x="92" y="220">监督微调，模仿理想回答</text>

<line x1="195" y1="228" x2="195" y2="240" stroke="var(--fg-muted)" stroke-width="1.4"/>
<polygon points="195,244 191,236 199,236" fill="var(--fg-muted)"/>

<rect x="80" y="246" width="230" height="40" rx="6" fill="var(--bg)" stroke="var(--layer-stroke)" stroke-width="1.2"/>
<text class="th" x="92" y="264">② Reward Model</text>
<text class="ts" x="92" y="280">人类偏好对 → 偏好打分网络</text>

<line x1="195" y1="288" x2="195" y2="300" stroke="var(--fg-muted)" stroke-width="1.4"/>
<polygon points="195,304 191,296 199,296" fill="var(--fg-muted)"/>

<rect x="80" y="306" width="230" height="40" rx="6" fill="var(--bg)" stroke="var(--layer-stroke)" stroke-width="1.2"/>
<text class="th" x="92" y="324">③ PPO + KL 约束</text>
<text class="ts" x="92" y="340">RL 微调，对 SFT 模型加 KL 防漂移</text>

<text class="ts" x="80" y="365">灵活 · reward shaping · multi-stage</text>

<text class="caption-strong" x="340" y="245" text-anchor="middle">vs</text>

<rect class="layer" x="350" y="95" width="270" height="290" rx="8"/>
<text class="eyebrow" x="370" y="117">开源主流</text>
<text class="eyebrow eyebrow-accent" x="600" y="117" text-anchor="end">→ 4×H100 几天可跑</text>
<text class="th" x="370" y="142">DPO</text>
<text class="ts" x="370" y="160">Stanford 2023 把 RL 拿掉的洞见</text>
<line x1="370" y1="172" x2="600" y2="172" stroke="var(--divider)" stroke-width="1"/>

<rect x="370" y="186" width="230" height="40" rx="6" fill="var(--bg)" stroke="var(--layer-stroke)" stroke-width="1.2"/>
<text class="th" x="382" y="204">① SFT</text>
<text class="ts" x="382" y="220">监督微调，模仿理想回答</text>

<line x1="485" y1="228" x2="485" y2="240" stroke="var(--fg-muted)" stroke-width="1.4"/>
<polygon points="485,244 481,236 489,236" fill="var(--fg-muted)"/>

<rect x="370" y="246" width="230" height="60" rx="6" fill="var(--bg)" stroke="var(--accent-stroke)" stroke-width="1.4"/>
<text class="th" x="382" y="264">② 对比损失直训</text>
<text class="ts" x="382" y="282">偏好数据 → 一个监督学习目标</text>
<text class="ts eyebrow-accent" x="382" y="298">不需 reward model，不需 RL</text>

<text class="ts" x="370" y="335">SFT-style 简单 · 训练稳定 · 跟梯度下降一样跑</text>
<text class="ts" x="370" y="355">局限：缺 RL 那套 reward shaping 和 multi-stage 的灵活度</text>

<rect class="layer" x="60" y="405" width="560" height="115" rx="8"/>

<text class="caption-strong" x="82" y="427">DPO 变体（针对 DPO 不同局限的改进）</text>
<text class="ts" x="82" y="447">IPO 防过拟合 · KTO 不需要成对偏好（单标签也行）· ORPO 把 SFT 和偏好对齐合并成一步</text>

<text class="caption-strong" x="82" y="470">开源工具栈</text>
<text class="ts" x="82" y="490">TRL（基础库）· Axolotl · Unsloth · LLaMA-Factory（高层封装），yaml 配置一行切换算法</text>

<text class="ts eyebrow-accent" x="82" y="510">2026 趋势：大厂内部测 DPO，开源圈测 GRPO / RLOO，PPO ↔ DPO 边界在松动</text>
</svg>
